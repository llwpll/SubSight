name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package
        run: Scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_DIR=".build/release-artifacts/SubSight-$VERSION"
          gh release create "$GITHUB_REF_NAME" \
            "$ARTIFACT_DIR"/* \
            --title "SubSight $VERSION" \
            --generate-notes
