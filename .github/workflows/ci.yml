name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test And Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build App
        run: CONFIGURATION=release Scripts/build-app.sh

      - name: Build CLI
        run: swift build -c release --product subsightctl

      - name: Package Release Artifacts
        run: Scripts/package-release.sh
